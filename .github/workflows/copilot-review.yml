name: Auto Request Copilot Review

on:
  pull_request:
    branches:
      - main
    types: [opened, synchronize, reopened]

jobs:
  request-copilot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    env:
      # GitHub CLI requires GH_TOKEN to be set in Actions
      GH_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install Copilot CLI
        run: gh extension install github/gh-copilot
        
      - name: Request Copilot Review
        run: |
          gh pr edit ${{ github.event.pull_request.number }} --add-reviewer github-copilot